upstream gravity_collectors {
    least_conn;
    server collector:8001;
    keepalive 32;
}

server {
    listen 8001;

    # Agents → Collectors (HTTP + compression)
    location /collect/ {
        proxy_pass http://gravity_collectors;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;

        # Accepter les payloads compressés des agents
        proxy_set_header Content-Encoding $http_content_encoding;

        # Limite de taille (50MB max par batch)
        client_max_body_size 50m;
    }

    location /health {
        proxy_pass http://gravity_collectors;
        access_log off;
    }
}
